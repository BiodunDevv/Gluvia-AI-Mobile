name: Android Play Store Build

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "**/*.md"
      - "README.md"

  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - preview
          - apk
      submit:
        description: "Submit production builds to Google Play after the build finishes."
        required: true
        default: true
        type: boolean

concurrency:
  group: android-playstore-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android AAB
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Verify Expo config
        run: npx expo config --type public

      - name: Build Android Play Store bundle
        run: |
          PROFILE="${{ github.event.inputs.profile || 'production' }}"
          SUBMIT="${{ github.event.inputs.submit || 'true' }}"

          if [ "$PROFILE" = "production" ] && [ "$SUBMIT" = "true" ]; then
            eas build --platform android --profile "$PROFILE" --non-interactive --auto-submit
          else
            eas build --platform android --profile "$PROFILE" --non-interactive
          fi
        env:
          EAS_BUILD_NO_EXPO_GO_WARNING: "true"
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_GOOGLE_CSE_API_KEY: ${{ secrets.EXPO_PUBLIC_GOOGLE_CSE_API_KEY }}
          EXPO_PUBLIC_GOOGLE_CSE_ENGINE_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_CSE_ENGINE_ID }}
          EXPO_PUBLIC_TRANSLATOR_API_KEY: ${{ secrets.EXPO_PUBLIC_TRANSLATOR_API_KEY }}
          EXPO_PUBLIC_TRANSLATOR_ENDPOINT: ${{ secrets.EXPO_PUBLIC_TRANSLATOR_ENDPOINT }}
          EXPO_PUBLIC_TRANSLATOR_REGION: ${{ secrets.EXPO_PUBLIC_TRANSLATOR_REGION }}

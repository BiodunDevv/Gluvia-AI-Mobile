name: Android Play Store Build

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - "**.md"

  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - preview
          - apk
      submit:
        description: "Submit to Play Store after build?"
        required: true
        default: "true"
        type: boolean

jobs:
  build:
    name: EAS Build → Play Store
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build and submit to Play Store
        run: |
          PROFILE="${{ github.event.inputs.profile || 'production' }}"
          SUBMIT="${{ github.event.inputs.submit || 'true' }}"

          if [ "$SUBMIT" = "true" ] && [ "$PROFILE" = "production" ]; then
            eas build --platform android --profile "$PROFILE" --non-interactive --auto-submit
          else
            eas build --platform android --profile "$PROFILE" --non-interactive
          fi
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
